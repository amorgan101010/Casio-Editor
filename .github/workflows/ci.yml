name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-policy:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce a project version bump for non-doc PRs into main
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          # Single source of truth for the whole project (app + core) -- see
          # core/include/casioxw/Version.h. Any change that isn't docs-only warrants a release,
          # so it warrants a bump here.
          version_file = "core/include/casioxw/Version.h"
          version_pattern = re.compile(r'kVersion\s*=\s*"([^"]+)"')
          # Rollout fallback: base commits from before the app/core versions were unified into
          # version_file still carry the old app/AppVersion.h#kApplicationVersion. Only the base
          # side of an in-flight PR can predate version_file; drop this once main's history no
          # longer needs it.
          legacy_version_file = "app/AppVersion.h"
          legacy_version_pattern = re.compile(r'kApplicationVersion\s*=\s*"([^"]+)"')
          semver = re.compile(r'^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$')
          docs_exts = {".md", ".mdx", ".rst", ".adoc", ".txt"}
          docs_prefixes = ("docs/", "reference/")

          def changed_paths(base_sha: str, head_sha: str):
              return subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_sha}...{head_sha}"],
                  text=True,
              ).splitlines()

          def is_doc_path(path: str) -> bool:
              normalized = path.strip().lower()
              if not normalized:
                  return False

              if normalized.endswith("/"):
                  normalized = normalized[:-1]

              if normalized.startswith(docs_prefixes):
                  return True

              if "/" in normalized:
                  _, filename = normalized.rsplit("/", 1)
              else:
                  filename = normalized

              if "." in filename:
                  ext = "." + filename.rsplit(".", 1)[1]
                  return ext in docs_exts

              return filename in {"license", "copying", "notice"}

          def show_file_at(sha: str, path: str):
              try:
                  return subprocess.check_output(
                      ["git", "show", f"{sha}:{path}"],
                      text=True,
                      stderr=subprocess.STDOUT,
                  )
              except subprocess.CalledProcessError as e:
                  out = e.output or ""
                  missing = ("exists on disk, but not in" in out) or ("does not exist in" in out)
                  if missing:
                      return None
                  print(out)
                  raise RuntimeError(f"Failed to read {path} at {sha}") from e

          def extract_semver(text: str, source: str, regex: re.Pattern) -> str:
              m = regex.search(text)
              if not m:
                  raise RuntimeError(f"Could not find version in {source}")
              v = m.group(1)
              if not semver.fullmatch(v):
                  raise RuntimeError(f"{source} has non-semver version '{v}'")
              return v

          def read_version_at(sha: str) -> str:
              text = show_file_at(sha, version_file)
              if text is not None:
                  return extract_semver(text, f"{version_file} at {sha}", version_pattern)

              legacy_text = show_file_at(sha, legacy_version_file)
              if legacy_text is not None:
                  return extract_semver(legacy_text, f"{legacy_version_file} at {sha}", legacy_version_pattern)

              raise RuntimeError(
                  f"No version source found at {sha}; expected {version_file} "
                  f"or legacy {legacy_version_file}"
              )

          changed = changed_paths(os.environ["BASE_SHA"], os.environ["HEAD_SHA"])
          non_doc_changed = [path for path in changed if not is_doc_path(path)]

          if changed and not non_doc_changed:
              print("Version policy skipped: docs-only PR into main.")
              sys.exit(0)

          base_version = read_version_at(os.environ["BASE_SHA"])
          head_version = read_version_at(os.environ["HEAD_SHA"])

          if base_version == head_version:
              print(
                  f"Non-doc changes require a project version bump ({version_file}): "
                  f"base={base_version}, head={head_version}"
              )
              sys.exit(1)

          print(f"Version policy OK: {base_version} -> {head_version}")
          PY

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglu1-mesa-dev mesa-common-dev

      # FetchContent clones JUCE + Catch2 into build/_deps on every configure.
      # Cache it keyed on the pinned tags (in CMakeLists.txt) so a bump to
      # either tag naturally invalidates the cache.
      - name: Cache FetchContent deps (JUCE, Catch2)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  release:
    # Fires once per push to main (i.e. once per merged PR, since main is protected). Gated on
    # build-and-test passing for this same commit rather than trusting the PR's pre-merge check,
    # since a merge commit is its own new tree.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(sed -n 's/.*kVersion *= *"\([^"]*\)".*/\1/p' core/include/casioxw/Version.h)
          if [ -z "$version" ]; then
            echo "Could not read kVersion from core/include/casioxw/Version.h" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if this version was already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists (docs-only or already-released merge) -- skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install JUCE Linux build dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: Cache FetchContent deps (JUCE, Catch2)
        if: steps.check.outputs.exists == 'false'
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure (Release)
        if: steps.check.outputs.exists == 'false'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Only the shipped app target -- params/xwp1.json and the icon are compiled in as binary
      # data (app/CMakeLists.txt), so this binary has no runtime dependency on the source tree
      # it was built from and is safe to hand to someone who only has the release tarball.
      - name: Build CasioXWEditor
        if: steps.check.outputs.exists == 'false'
        run: cmake --build build --target CasioXWEditor

      - name: Package artifact
        if: steps.check.outputs.exists == 'false'
        run: |
          stage="CasioXWEditor-${{ steps.version.outputs.version }}-linux-x86_64"
          mkdir -p "$stage"
          cp "build/app/CasioXWEditor_artefacts/Release/Casio XW-P1 Editor" "$stage/CasioXWEditor"
          cp README.md "$stage/"
          tar -czf "$stage.tar.gz" "$stage"
          echo "ASSET_PATH=$stage.tar.gz" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "$ASSET_PATH" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-policy:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce component semver bumps for non-doc PRs into main
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          app_version_file = "app/AppVersion.h"
          app_legacy_version_file = "app/Main.cpp"
          app_pattern = re.compile(r'kApplicationVersion\s*=\s*"([^"]+)"')
          app_legacy_pattern = re.compile(r'getApplicationVersion\(\)\s+override\s*\{\s*return\s+"([^"]+)"\s*;\s*\}')
          core_version_file = "core/include/casioxw/CoreVersion.h"
          core_pattern = re.compile(r'kCoreVersion\s*=\s*"([^"]+)"')
          semver = re.compile(r'^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$')
          docs_exts = {".md", ".mdx", ".rst", ".adoc", ".txt"}
          docs_prefixes = ("docs/", "reference/")

          def changed_paths(base_sha: str, head_sha: str):
              return subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_sha}...{head_sha}"],
                  text=True,
              ).splitlines()

          def is_doc_path(path: str) -> bool:
              normalized = path.strip().lower()
              if not normalized:
                  return False

              if normalized.endswith("/"):
                  normalized = normalized[:-1]

              if normalized.startswith(docs_prefixes):
                  return True

              if "/" in normalized:
                  _, filename = normalized.rsplit("/", 1)
              else:
                  filename = normalized

              if "." in filename:
                  ext = "." + filename.rsplit(".", 1)[1]
                  return ext in docs_exts

              return filename in {"license", "copying", "notice"}

          def show_file_at(sha: str, path: str):
              try:
                  return subprocess.check_output(
                      ["git", "show", f"{sha}:{path}"],
                      text=True,
                      stderr=subprocess.STDOUT,
                  )
              except subprocess.CalledProcessError as e:
                  out = e.output or ""
                  # During rollout, base commits may predate app/AppVersion.h.
                  missing = ("exists on disk, but not in" in out) or ("does not exist in" in out)
                  if missing:
                      return None
                  print(out)
                  raise RuntimeError(f"Failed to read {path} at {sha}") from e

          def extract_semver(text: str, source: str, regex: re.Pattern) -> str:
              m = regex.search(text)
              if not m:
                  raise RuntimeError(f"Could not find version in {source}")
              v = m.group(1)
              if not semver.fullmatch(v):
                  raise RuntimeError(f"{source} has non-semver version '{v}'")
              return v

          def read_app_at(sha: str) -> str:
              text = show_file_at(sha, app_version_file)
              if text is not None:
                  return extract_semver(text, f"{app_version_file} at {sha}", app_pattern)

              legacy_text = show_file_at(sha, app_legacy_version_file)
              if legacy_text is not None:
                  return extract_semver(legacy_text, f"{app_legacy_version_file} at {sha}", app_legacy_pattern)

              raise RuntimeError(
                  f"No app version source found at {sha}; expected {app_version_file} "
                  f"or legacy {app_legacy_version_file}"
              )

          def read_core_at(sha: str) -> str:
              text = show_file_at(sha, core_version_file)
              if text is None:
                  raise RuntimeError(f"Could not read {core_version_file} at {sha}")
              return extract_semver(text, f"{core_version_file} at {sha}", core_pattern)

          changed = changed_paths(os.environ["BASE_SHA"], os.environ["HEAD_SHA"])
          non_doc_changed = [path for path in changed if not is_doc_path(path)]

          if changed and not non_doc_changed:
              print("Version policy skipped: docs-only PR into main.")
              sys.exit(0)

          touches_core = any(path.startswith("core/") for path in non_doc_changed)
          touches_app = any(not path.startswith("core/") for path in non_doc_changed)
          failures = []

          if touches_app:
              app_base = read_app_at(os.environ["BASE_SHA"])
              app_head = read_app_at(os.environ["HEAD_SHA"])
              if app_base == app_head:
                  failures.append(
                      f"App-impacting changes require app semver bump ({app_version_file}): "
                      f"base={app_base}, head={app_head}"
                  )

          if touches_core:
              core_base = read_core_at(os.environ["BASE_SHA"])
              core_head = read_core_at(os.environ["HEAD_SHA"])
              if core_base == core_head:
                  failures.append(
                      f"Core changes require core semver bump ({core_version_file}): "
                      f"base={core_base}, head={core_head}"
                  )

          if failures:
              for failure in failures:
                  print(failure)
              sys.exit(1)

          scoped = []
          if touches_app:
              scoped.append("app")
          if touches_core:
              scoped.append("core")
          print(f"Version policy OK for scopes: {', '.join(scoped)}")
          PY

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglu1-mesa-dev mesa-common-dev

      # FetchContent clones JUCE + Catch2 into build/_deps on every configure.
      # Cache it keyed on the pinned tags (in CMakeLists.txt) so a bump to
      # either tag naturally invalidates the cache.
      - name: Cache FetchContent deps (JUCE, Catch2)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

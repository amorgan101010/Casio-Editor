<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Solarized Dark Color Scheme -->
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2aa198"/>
            <stop offset="100%" stop-color="#1b7069"/>
        </linearGradient>
        
        <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#cb4b16"/>
            <stop offset="100%" stop-color="#993810"/>
        </linearGradient>

        <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#073642"/>
            <stop offset="100%" stop-color="#002b36"/>
        </radialGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Paths -->
        <path id="X-path" d="M 0,0 L 35,0 L 50,25 L 65,0 L 100,0 L 65,50 L 100,100 L 65,100 L 50,75 L 35,100 L 0,100 L 35,50 Z" />
        <path id="W-path" d="M 0,0 L 32,0 L 43,55 L 50,25 L 57,55 L 68,0 L 100,0 L 72,100 L 57,100 L 50,70 L 43,100 L 28,100 Z" />
        <path id="P-path" d="M 0,0 L 70,0 L 100,30 L 100,60 L 70,90 L 30,90 L 30,100 L 0,100 Z M 30,30 L 30,60 L 60,60 L 70,50 L 70,40 L 60,30 Z" fill-rule="evenodd" />
        <path id="One-path" d="M 10,30 L 50,0 L 80,0 L 80,100 L 50,100 L 50,40 L 10,70 Z" />
    </defs>

    <!-- Background -->
    <rect width="512" height="512" rx="90" fill="url(#bgGlow)"/>
    <rect width="480" height="480" x="16" y="16" rx="80" fill="none" stroke="#073642" stroke-width="8"/>

    <!-- Letters (Padded and Centered) -->
    <g filter="url(#glow)" transform="translate(64, 64) scale(0.75)">
        <!-- Top Row -->
        <use href="#X-path" transform="translate(0, 0) scale(2.2)" fill="url(#cyanGrad)"/>
        <use href="#W-path" transform="translate(280, 0) scale(2.2)" fill="url(#cyanGrad)"/>
        
        <!-- Bottom Row -->
        <use href="#P-path" transform="translate(0, 260) scale(2.2)" fill="url(#orangeGrad)"/>
        <use href="#One-path" transform="translate(280, 260) scale(2.2)" fill="url(#orangeGrad)"/>
    </g>
</svg>
